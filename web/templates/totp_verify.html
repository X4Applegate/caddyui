{{define "title"}}Two-Factor Auth · CaddyUI{{end}}
{{define "content"}}
<div class="min-h-screen flex items-center justify-center bg-ink-50 px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <span class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-brand-500 shadow-card mb-4">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-white"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
      </span>
      <h1 class="text-2xl font-semibold text-ink-900">Two-Factor Auth</h1>
      <p class="text-sm text-ink-500 mt-1">Enter the 6-digit code from your authenticator app.</p>
    </div>
    <div class="bg-white border border-ink-200 rounded-xl shadow-card p-6">
      {{if .Error}}<div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-2 rounded-lg mb-4">{{.Error}}</div>{{end}}
      <form method="post" action="/login/totp">
        <input type="hidden" name="token" value="{{.Token}}">
        <div class="mb-4">
          <label class="block text-xs font-medium text-ink-700 mb-1">Authenticator code</label>
          <input type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autofocus autocomplete="one-time-code"
            class="w-full border border-ink-200 rounded-lg px-3 py-2.5 text-sm text-center tracking-widest text-lg font-mono focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition"
            placeholder="000000">
        </div>
        <button class="w-full bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium py-2.5 rounded-lg transition">Verify</button>
      </form>
    </div>
    <p class="text-center text-xs text-ink-400 mt-4"><a href="/login" class="hover:text-ink-700 transition">Back to login</a></p>
  </div>
</div>
{{end}}
