{{define "title"}}{{.Target.Name}} · Config · CaddyUI{{end}}
{{define "content"}}
<div class="mb-6">
  <a href="/servers" class="text-xs text-ink-400 hover:text-ink-600 transition inline-flex items-center gap-1">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Caddy Servers
  </a>
  <div class="flex items-start justify-between gap-4 mt-2">
    <div class="min-w-0">
      <h1 class="text-2xl font-semibold tracking-tight text-ink-900 truncate">{{.Target.Name}}</h1>
      <p class="text-xs font-mono text-ink-500 mt-1 break-all">{{.Target.AdminURL}}/config/</p>
    </div>
    <a href="/servers/{{.Target.ID}}/edit" class="shrink-0 inline-flex items-center gap-1.5 bg-white hover:bg-ink-50 border border-ink-200 text-ink-700 text-sm font-medium px-4 py-2 rounded-lg transition">Edit</a>
  </div>
</div>

{{if .Error}}
<div class="p-4 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
  <div class="font-medium mb-1">Couldn't reach this server</div>
  <div class="font-mono text-xs break-all">{{.Error}}</div>
</div>
{{else}}
<div class="bg-white border border-ink-200 rounded-xl shadow-card overflow-hidden">
  <div class="px-5 py-3 border-b border-ink-100 flex items-center justify-between text-xs text-ink-500">
    <span>Live configuration from /config/</span>
    <span class="font-mono">HTTP {{.Status}}</span>
  </div>
  <pre class="bg-ink-900 text-ink-100 text-xs p-4 overflow-x-auto max-h-[70vh]">{{.Config}}</pre>
</div>
{{end}}
{{end}}
