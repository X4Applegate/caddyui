services:
  caddy:
    image: caddy:2-alpine
    container_name: caddyui-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      CADDY_ADMIN: 0.0.0.0:2019
      # Timezone for Caddy access logs and cert-renewal timestamps. Any
      # IANA zone name works (America/New_York, Europe/London, Asia/Tokyo,
      # UTC, …). Defaults to UTC when unset. CaddyUI honors the same
      # TZ var — pair them so log timestamps line up across both containers.
      TZ: ${TZ:-UTC}
    command: caddy run --config /config/caddy/autosave.json --resume --adapter json
    networks:
      - caddyui

  caddyui:
    # Local build. Pass CADDYUI_VERSION to stamp the version string the UI
    # shows — e.g. `CADDYUI_VERSION=v2.4.12 docker compose up -d --build`.
    # Defaults to "dev" when unset, which is why a fresh `docker compose up`
    # shows version "dev". For the published release image instead, swap
    # this block for `image: applegater/caddyui:latest` and drop `build:`.
    build:
      context: .
      args:
        VERSION: ${CADDYUI_VERSION:-dev}
    image: caddyui:latest
    container_name: caddyui
    restart: unless-stopped
    depends_on:
      - caddy
    ports:
      - "8081:8080"
    volumes:
      - caddyui_data:/data
      # Mount the same Caddyfile Caddy reads so paste-import can auto-load
      # snippet definitions. Read-only — caddyui never writes it.
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      CADDYUI_DB: /data/caddyui.db
      CADDYUI_LISTEN: :8080
      CADDY_ADMIN_URL: http://caddy:2019
      CADDYFILE_PATH: /etc/caddy/Caddyfile
      # Push DB state to Caddy on every startup so `docker compose restart`
      # rehydrates routes from the CaddyUI DB. Safe: SyncCaddy bails out when
      # the DB is empty, so first-boot won't wipe an existing Caddyfile.
      CADDYUI_SYNC_ON_START: "1"
      # Timezone for log timestamps and server-side date rendering in the
      # UI. Any IANA zone name works (America/New_York, Europe/London,
      # Asia/Tokyo, UTC, …). Defaults to UTC when unset. You can also
      # override per-user from Settings → Timezone; the DB value wins
      # over this env var when both are set.
      TZ: ${TZ:-UTC}
    networks:
      - caddyui

volumes:
  caddy_data:
  caddy_config:
  caddyui_data:

networks:
  caddyui:
    driver: bridge
